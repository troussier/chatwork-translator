<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chatwork Translator Settings</title>
</head>
<body>

<h2>Chatwork Translator</h2>

<label>
  OpenAI API Key
</label><br>
<input id="apiKey" type="password" size="50"><br><br>

<label>
  Target Language
</label><br>
<select id="targetLang">
  <option value="en">English</option>
  <option value="ja">Japanese</option>
  <option value="zh">Chinese</option>
</select>

<br><br>
<button id="save">Save</button>

<p id="status"></p>

<script src="options.js"></script>

</body>
</html>
